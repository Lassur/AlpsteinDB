<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Druckansicht – Gipfelbuch Charts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
    }
    h2 {
      margin-top: 3rem;
    }
    canvas {
      max-width: 100%;
      margin-top: 1rem;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body onload="window.print()">
  <h1>Gipfelbuch Alpstein – Diagramme</h1>
  <h2>Einträge nach Jahren</h2>
  <canvas id="yearChart" height="80"></canvas>
  <h2>Einträge nach Saisonalität</h2>
  <canvas id="monthChart" height="80"></canvas>
  <h2>Einträge nach Routen</h2>
  <canvas id="routeChart" height="80"></canvas>

  <script src="chart-script.js"></script>
</body>
</html>

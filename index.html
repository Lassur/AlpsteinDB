<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Mountain Table</h2>

<table id="mountainTable">
    <thead>
        <tr>
            <th>Gipfel</th>
            <th>Datum</th>
            <th>Wer</th>
            <th>Route</th>
            <th>Notiz</th>
            <th>Gipfelbuch</th>
            <th>Erfasste Jahre</th>
        </tr>
    </thead>
    <tbody>
        <!-- Data will be dynamically populated here -->
    </tbody>
</table>

<script>
    // Function to fetch and parse CSV data
    function fetchCSV(url, callback) {
        fetch(url)
            .then(response => response.text())
            .then(text => {
                const rows = text.split('\n').map(row => row.split(','));
                callback(rows);
            });
    }

    // Function to populate table with data
    function populateTable(data) {
        const tableBody = document.querySelector('#mountainTable tbody');
        data.forEach(row => {
            const tr = document.createElement('tr');
            row.forEach(cell => {
                const td = document.createElement('td');
                td.textContent = cell;
                tr.appendChild(td);
            });
            tableBody.appendChild(tr);
        });
    }

    // Fetch and populate data
    fetchCSV('2024_Öberini_raw_webpage.csv', populateTable);
</script>

</body>
</html>

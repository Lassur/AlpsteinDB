<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Peaks Database</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.21/css/jquery.dataTables.min.css">
    <style>
        th, td {
            padding: 10px;
            text-align: left;
        }
        input[type="search"] {
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <h1>Mountain Peaks Database</h1>
    <table id="peaks-table" class="display">
        <thead>
            <tr>
                <th>Gipfel</th>
                <th>Datum</th>
                <th>Wer</th>
                <th>Route</th>
                <th>Notiz</th>
                <th>Gipfelbuch</th>
                <th>Erfasste Jahre</th>
            </tr>
            <tr>
                <th><input type="text" placeholder="Search Gipfel"></th>
                <th><input type="text" placeholder="Search Datum"></th>
                <th><input type="text" placeholder="Search Wer"></th>
                <th><input type="text" placeholder="Search Route"></th>
                <th><input type="text" placeholder="Search Notiz"></th>
                <th><input type="text" placeholder="Search Gipfelbuch"></th>
                <th><input type="text" placeholder="Search Erfasste Jahre"></th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
    <script>
        $(document).ready(function() {
            $.get('2024_Öberini_raw_webpage.csv', function(data) {
                const lines = data.split('\n');
                const rows = lines.slice(1);

                rows.forEach(row => {
                    const cells = row.split(',');
                    if (cells.length === 7) {
                        const tr = $('<tr></tr>');
                        cells.forEach(cell => {
                            tr.append($('<td></td>').text(cell.trim()));
                        });
                        $('#peaks-table tbody').append(tr);
                    }
                });

                const table = $('#peaks-table').DataTable();

                // Apply the search
                $('#peaks-table thead tr:eq(1) th').each(function (i) {
                    $('input', this).on('keyup change clear', function () {
                        if (table.column(i).search() !== this.value) {
                            table
                                .column(i)
                                .search(this.value)
                                .draw();
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>

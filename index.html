<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mountain Table</title>
<style>
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid black;
        padding: 8px;
        text-align: left;
    }
    th {
        background-color: #f2f2f2;
    }
</style>
</head>
<body>

<h2>Mountain Table</h2>

<table id="mountainTable">
  <thead>
    <tr>
      <th>Gipfel</th>
      <th>Datum</th>
      <th>Wer</th>
      <th>Route</th>
      <th>Wer (un-merged)</th>
      <th>Route (un-merged)</th>
      <th>Notiz</th>
      <th>Gipfelbuch</th>
      <th>Erfasste Jahre</th>
      <th>Doppelt eingetragen</th>
      <th>Kommentar A. Koller</th>
    </tr>
  </thead>
  <tbody id="mountainTableBody">
  </tbody>
</table>

<script>
    window.onload = function() {
        fetch('2024_Öberini_raw_webpage.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // skip header row
                const tbody = document.getElementById('mountainTableBody');
                rows.forEach(row => {
                    const columns = row.split(',');
                    const tr = document.createElement('tr');
                    columns.forEach(column => {
                        const td = document.createElement('td');
                        td.textContent = column;
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            });
    }
</script>

</body>
</html>

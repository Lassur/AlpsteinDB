<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Mountain Table</h2>

<table>
    <thead>
        <tr>
            <th>Gipfel</th>
            <th>Datum</th>
            <th>Wer</th>
            <th>Route</th>
            <th>Notiz</th>
            <th>Gipfelbuch</th>
            <th>Erfasste Jahre</th>
        </tr>
    </thead>
    <tbody>
        <!-- Add your table rows here -->
        <tr>
            <td>Mountain 1</td>
            <td>2024-04-22</td>
            <td>John Doe</td>
            <td>Route 1</td>
            <td>Note 1</td>
            <td>Yes</td>
            <td>5</td>
        </tr>
        <tr>
            <td>Mountain 2</td>
            <td>2024-04-23</td>
            <td>Jane Smith</td>
            <td>Route 2</td>
            <td>Note 2</td>
            <td>No</td>
            <td>3</td>
        </tr>
        <!-- Add more rows as needed -->
    </tbody>
</table>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpstein Database</title>
<style>
    /* CSS styles for the webpage */
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        font-size: 14px;
    }
    /* Other styles... */
</style>
</head>
<body>

<header>
    <h1>Alpstein Database</h1>
</header>

<!-- Button to open filter dialog -->
<button onclick="openFilterDialog()">Filter</button>

<!-- Table to display data -->
<table id="mountainTable">
  <thead class="header-fixed">
    <!-- Table headers with onclick events for sorting -->
    <tr>
      <!-- Headers... -->
    </tr>
  </thead>
  <tbody id="mountainTableBody">
    <!-- Table rows will be populated dynamically -->
  </tbody>
</table>

<footer>
    <p>&copy; Andi Koller, 2024</p>
</footer>

<!-- Filter dialog box -->
<div id="filterDialog" class="dialog-overlay">
    <div class="dialog-box">
        <span class="dialog-close" onclick="closeFilterDialog()">X</span>
        <h2>Filter Data</h2>
        <form id="filterForm">
            <!-- Filter fields will be added dynamically using JavaScript -->
        </form>
    </div>
</div>

<!-- JavaScript code for functionality -->
<script type="text/javascript">
    window.onload = function() {
        // Fetch data and populate the table
        fetch('2024_Öberini_raw_webpage.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // skip header row
                const tbody = document.getElementById('mountainTableBody');
                rows.forEach(row => {
                    const columns = row.split(',');
                    const tr = document.createElement('tr');
                    columns.forEach(column => {
                        const td = document.createElement('td');
                        td.textContent = column;
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
                // Populate filter options after table data is loaded
                populateFilterOptions();
            });
    }

    // Function to populate filter options dynamically
    function populateFilterOptions() {
        const form = document.getElementById('filterForm');

        // Example: Add filter fields for Gipfel
        const gipfelLabel = document.createElement('label');
        gipfelLabel.textContent = 'Gipfel:';
        form.appendChild(gipfelLabel);
        const gipfelInput = document.createElement('input');
        gipfelInput.type = 'text';
        gipfelInput.id = 'gipfelFilter';
        form.appendChild(gipfelInput);
    }

    // Function to apply filters based on user selections
    function applyFilters() {
        const gipfelFilter = document.getElementById('gipfelFilter').value;
        const tableRows = document.querySelectorAll('#mountainTable tbody tr');

        tableRows.forEach(row => {
            const gipfelValue = row.querySelector('td:nth-child(1)').textContent.trim();
            if (gipfelFilter !== '' && gipfelValue !== gipfelFilter) {
                row.style.display = 'none';
            } else {
                row.style.display = '';
            }
        });
    }

    // Function to open filter dialog
    function openFilterDialog() {
        const dialog = document.getElementById('filterDialog');
        dialog.style.display = 'flex';
    }

    // Function to close filter dialog
    function closeFilterDialog() {
        const dialog = document.getElementById('filterDialog');
        dialog.style.display = 'none';
    }
</script>

</body>
</html>

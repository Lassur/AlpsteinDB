<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Table</title>
    <style>
        /* Your CSS styles here */
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
            font-size: 14px; /* Adjust font size for table cells */
            word-wrap: break-word; /* Allow long words to wrap */
        }
        th {
            background-color: #f2f2f2;
            cursor: pointer;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .collapsed {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Database Table</h1>

    <div id="filterOptions">
        Filter by:
        <select id="filterGipfel" onchange="filterColumn(0)">
            <option value="">-- Select Gipfel --</option>
            <!-- Dynamically populate options using JavaScript -->
        </select>
        <select id="filterDatum" onchange="filterColumn(1)">
            <option value="">-- Select Datum --</option>
            <!-- Dynamically populate options using JavaScript -->
        </select>
        <select id="filterWer" onchange="filterColumn(2)">
            <option value="">-- Select Wer --</option>
            <!-- Dynamically populate options using JavaScript -->
        </select>
        <!-- Add filter options for other columns as needed -->
    </div>

    <input type="text" id="searchInput" placeholder="Search...">
    <div id="pagination">
        Show 
        <select id="rowsPerPage">
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select> 
        rows per page
        <button id="prevPage" onclick="prevPage()">Previous</button>
        <button id="nextPage" onclick="nextPage()">Next</button>
        <span id="currentPage">Page 1</span>
    </div>

    <table>
        <thead id="tableHead">
            <!-- Header row will be dynamically populated -->
        </thead>
        <tbody>
            <!-- Dynamically populate table rows using JavaScript -->
        </tbody>
    </table>

    <script>
        var currentPage = 1; // Current page number
        var totalRows = 0; // Total number of rows
        var rowsPerPage = 20; // Default rows per page
        var filters = Array.from({ length: 11 }, () => "");

        // Function to populate the table with data from CSV file
        function populateTable(csvData) {
            var tableHead = document.getElementById('tableHead');
            var tableBody = document.querySelector('tbody');
            var filterOptions = document.getElementById('filterOptions');

            // Parse CSV data into array of arrays
            var rows = csvData.split('\n').map(row => row.split(','));
            totalRows = rows.length - 1; // Exclude header row

            // Generate table header dynamically
            var headerRow = document.createElement('tr');
            rows[0].forEach(columnName => {
                var th = document.createElement('th');
                var input = document.createElement('input');
                input.type = "text";
                input.placeholder = "Filter";
                input.oninput = filterTable;
                th.appendChild(input);
                th.textContent = columnName;
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            // Generate filter options dynamically
            rows[0].forEach((columnName, index) => {
                var select = document.getElementById('filter' + columnName);
                if (select) {
                    var options = new Set();
                    for (var i = 1; i < rows.length; i++) {
                        options.add(rows[i][index]);
                    }
                    options.forEach(option => {
                        var optionElem = document.createElement('option');
                        optionElem.value = option;
                        optionElem.textContent = option;
                        select.appendChild(optionElem);
                    });
                }
            });

            // Generate table rows dynamically for the current page
            updateTable(tableBody);
        }

        // Fetch the CSV file and populate the table
        fetch('2024_Öberini_raw_webpage.csv')
            .then(response => response.text())
            .then(populateTable)
            .catch(error => console.error('Error fetching CSV file:', error));

        // Function to toggle visibility of a column
        function toggleColumn(columnIndex) {
            var table = document.querySelector('table');
            var rows = table.getElementsByTagName('tr');
            var headerRow = rows[0];
            var th = headerRow.getElementsByTagName('th')[columnIndex];
            var isCollapsed = th.classList.toggle('collapsed');
            var cells = document.querySelectorAll('tbody td:nth-child(' + (columnIndex + 1) + ')');
            for (var i = 0; i < cells.length; i++) {
                cells[i].style.display = isCollapsed ? 'none' : '';
            }
        }

        // Function to sort the table by column index
        function sortTable(columnIndex) {
            var table, rows, switching, i, x, y, shouldSwitch;
            table = document.querySelector('table');
            switching = true;
            while (switching) {
                switching = false;
                rows = table.rows;
                for (i = 1; i < (rows.length - 1); i++) {
                    shouldSwitch = false;
                    x = rows[i].getElementsByTagName('td')[columnIndex];
                    y = rows[i + 1].getElementsByTagName('td')[columnIndex];
                    if (x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
                        shouldSwitch = true;
                        break;
                    }
                }
                if (shouldSwitch) {
                    rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                    switching = true;
                }
            }
        }

        // Function to update table rows for the current page
        function updateTable(tableBody) {
            tableBody.innerHTML = ''; // Clear existing table rows
            var start = (currentPage - 1) * rowsPerPage + 1;
            var end = Math.min(start + rowsPerPage - 1, totalRows);
            fetch('2024_Öberini_raw_webpage.csv')
                .then(response => response.text())
                .then(csvData => {
                    var rows = csvData.split('\n').map(row => row.split(','));
                    for (var i = start; i <= end; i++) {
                        var tr = document.createElement('tr');
                        if (rows[i]) {
                            rows[i].forEach(cellData => {
                                var td = document.createElement('td');
                                td.textContent = cellData;
                                tr.appendChild(td);
                            });
                            tableBody.appendChild(tr);
                        }
                    }
                    updatePagination();
                })
                .catch(error => console.error('Error fetching CSV file:', error));
        }

        // Function to update pagination controls
        function updatePagination() {
            var totalPages = Math.ceil(totalRows / rowsPerPage);
            document.getElementById('currentPage').textContent = 'Page ' + currentPage + ' of ' + totalPages;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }

        // Function to show the previous page
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                var tableBody = document.querySelector('tbody');
                updateTable(tableBody);
            }
        }

        // Function to show the next page
        function nextPage() {
            var totalPages = Math.ceil(totalRows / rowsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                var tableBody = document.querySelector('tbody');
                updateTable(tableBody);
            }
        }

        // Function to handle changing the number of rows per page
        document.getElementById('rowsPerPage').addEventListener('change', function() {
            rowsPerPage = parseInt(this.value);
            currentPage = 1; // Reset to first page
            var tableBody = document.querySelector('tbody');
            updateTable(tableBody);
        });

        // Function to filter table rows based on input value
        function filterTable() {
            var table = document.querySelector('table');
            var rows = table.getElementsByTagName('tr');
            var searchText = document.getElementById('searchInput').value.toLowerCase();
            for (var i = 1; i < rows.length; i++) {
                var row = rows[i];
                var cells = row.getElementsByTagName('td');
                var shouldShow = true;
                for (var j = 0; j < cells.length; j++) {
                    var cell = cells[j];
                    var columnIndex = j;
                    var filterText = document.getElementById('tableHead').getElementsByTagName('input')[columnIndex].value.toLowerCase();
                    var cellText = cell.textContent.toLowerCase();
                    if (filterText && cellText.indexOf(filterText) === -1) {
                        shouldShow = false;
                        break;
                    }
                }
                if (searchText && row.textContent.toLowerCase().indexOf(searchText) === -1) {
                    shouldShow = false;
                }
                row.style.display = shouldShow ? '' : 'none';
            }
        }

        // Function to filter table rows based on selected option for a column
        function filterColumn(columnIndex) {
            var select = document.getElementById('filter' + rows[0][columnIndex]);
            var filterValue = select.value;
            var table = document.querySelector('table');
            var rows = table.getElementsByTagName('tr');
            for (var i = 1; i < rows.length; i++) {
                var row = rows[i];
                var cell = row.getElementsByTagName('td')[columnIndex];
                var cellText = cell.textContent || cell.innerText;
                row.style.display = !filterValue || cellText.indexOf(filterValue) > -1 ? '' : 'none';
            }
        }
    </script>

</body>
</html>

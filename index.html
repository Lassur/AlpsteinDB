<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Table</title>
    <style>
        /* Your CSS styles here */
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 5px;
            font-size: 14px; /* Adjust font size */
            word-wrap: break-word; /* Allow long words to wrap */
        }
        th {
            background-color: #f2f2f2;
            cursor: pointer;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        #pagination {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Database Table</h1>

    <input type="text" id="searchInput" placeholder="Search...">
    <div id="pagination">
        Show 
        <select id="rowsPerPage">
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select> 
        rows per page
        <button id="prevPage" onclick="prevPage()">Previous</button>
        <button id="nextPage" onclick="nextPage()">Next</button>
        <span id="currentPage">Page 1</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>
                    <input type="text" id="filterGipfel" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterDatum" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterWer" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterRoute" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterWerUnmerged" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterRouteUnmerged" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterNotiz" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterGipfelbuch" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterErfassteJahre" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterDoppeltEingetragen" oninput="filterTable()" placeholder="Filter">
                </th>
                <th>
                    <input type="text" id="filterKommentarAKoller" oninput="filterTable()" placeholder="Filter">
                </th>
            </tr>
        </thead>
        <tbody>
            <!-- Dynamically populate table rows using JavaScript -->
        </tbody>
    </table>

    <script>
        var currentPage = 1; // Current page number
        var totalRows = 0; // Total number of rows
        var rowsPerPage = 20; // Default rows per page
        var filters = Array.from({ length: 11 }, () => []);

        // Function to populate the table with data from CSV file
        function populateTable(csvData) {
            var tableBody = document.querySelector('tbody');

            // Parse CSV data into array of arrays
            var rows = csvData.split('\n').map(row => row.split(','));
            totalRows = rows.length - 1; // Exclude header row

            // Generate table rows dynamically for the current page
            updateTable(tableBody);
        }

        // Fetch the CSV file and populate the table
        fetch('2024_Öberini_raw_webpage.csv')
            .then(response => response.text())
            .then(populateTable)
            .catch(error => console.error('Error fetching CSV file:', error));

        // Function to sort the table by column index
        function sortTable(columnIndex) {
            var table, rows, switching, i, x, y, shouldSwitch;
            table = document.querySelector('table');
            switching = true;
            while (switching) {
                switching = false;
                rows = table.rows;
                for (i = 1; i < (rows.length - 1); i++) {
                    shouldSwitch = false;
                    x = rows[i].getElementsByTagName('td')[columnIndex];
                    y = rows[i + 1].getElementsByTagName('td')[columnIndex];
                    if (x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
                        shouldSwitch = true;
                        break;
                    }
                }
                if (shouldSwitch) {
                    rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                    switching = true;
                }
            }
        }

        // Function to update table rows for the current page
        function updateTable(tableBody) {
            tableBody.innerHTML = ''; // Clear existing table rows
            var start = (currentPage - 1) * rowsPerPage + 1;
            var end = Math.min(start + rowsPerPage - 1, totalRows);
            fetch('2024_Öberini_raw_webpage.csv')
                .then(response => response.text())
                .then(csvData => {
                    var rows = csvData.split('\n').map(row => row.split(','));
                    for (var i = start; i <= end; i++) {
                        var tr = document.createElement('tr');
                        if (rows[i]) {
                            rows[i].forEach(cellData => {
                                var td = document.createElement('td');
                                td.textContent = cellData;
                                tr.appendChild(td);
                            });
                            tableBody.appendChild(tr);
                        }
                    }
                    updatePagination();
                })
                .catch(error => console.error('Error fetching CSV file:', error));
        }

        // Function to update pagination controls
        function updatePagination() {
            var totalPages = Math.ceil(totalRows / rowsPerPage);
            document.getElementById('currentPage').textContent = 'Page ' + currentPage + ' of ' + totalPages;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }

        // Function to show the previous page
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                var tableBody = document.querySelector('tbody');
                updateTable(tableBody);
            }
        }

        // Function to show the next page
        function nextPage() {
            var totalPages = Math.ceil(totalRows / rowsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                var tableBody = document.querySelector('tbody');
                updateTable(tableBody);
            }
        }

        // Function to handle changing the number of rows per page
        document.getElementById('rowsPerPage').addEventListener('change', function() {
            rowsPerPage = parseInt(this.value);
            currentPage = 1; // Reset to first page
            var tableBody = document.querySelector('tbody');
            updateTable(tableBody);
        });

        // Function to filter table rows based on input value
        function filterTable() {
            var table = document.querySelector('table');
            var rows = table.getElementsByTagName('tr');
            var searchText = document.getElementById('searchInput').value.toLowerCase();
            for (var i = 1; i < rows.length; i++) {
                var row = rows[i];
                var cells = row.getElementsByTagName('td');
                var shouldShow = false;
                for (var j = 0; j < cells.length; j++) {
                    var cell = cells[j];
                    var columnIndex = j;
                    var filterText = document.getElementById('filter' + columnIndex).value.toLowerCase();
                    var cellText = cell.textContent.toLowerCase();
                    if (cellText.indexOf(filterText) > -1 && cellText.indexOf(searchText) > -1) {
                        shouldShow = true;
                        break;
                    }
                }
                row.style.display = shouldShow ? '' : 'none';
            }
        }
    </script>

</body>
</html>

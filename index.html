<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gipfelbuch DB</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            position: sticky;
            top: 0;
        }
        thead th {
            position: sticky;
            top: 0;
            z-index: 1;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .filter-input {
            width: 100%;
            box-sizing: border-box;
            padding: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Alpstein DB</h1>
    </header>

    <h2>Gipfelbuch DB</h2>
    <table id="gipfelbuchTable">
        <thead>
            <tr>
                <th>Gipfel <input class="filter-input" type="text" id="filterGipfel"></th>
                <th>Datum <input class="filter-input" type="text" id="filterDatum"></th>
                <th>Wer <input class="filter-input" type="text" id="filterWer"></th>
                <th>Route <input class="filter-input" type="text" id="filterRoute"></th>
                <th>Notiz <input class="filter-input" type="text" id="filterNotiz"></th>
                <th>Gipfelbuch <input class="filter-input" type="text" id="filterGipfelbuch"></th>
                <th>Erfasste Jahre <input class="filter-input" type="text" id="filterErfassteJahre"></th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will be dynamically populated here -->
        </tbody>
    </table>

    <footer>
        &copy; Andi Koller, 2024
    </footer>

    <script>
        fetch('2024_Öberini_raw_webpage.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // Exclude header row
                const tableBody = document.getElementById('tableBody');
                rows.forEach(row => {
                    const columns = row.split(',');
                    const newRow = document.createElement('tr');
                    columns.forEach(column => {
                        const newCell = document.createElement('td');
                        newCell.textContent = column;
                        newRow.appendChild(newCell);
                    });
                    tableBody.appendChild(newRow);
                });
            })
            .catch(error => console.error('Error fetching CSV file:', error));

        document.querySelectorAll('.filter-input').forEach(input => {
            input.addEventListener('input', function() {
                filterTable();
            });
        });

        function filterTable() {
            const filters = Array.from(document.querySelectorAll('.filter-input')).map(input => input.value.toUpperCase());
            const tableRows = document.getElementById('gipfelbuchTable').getElementsByTagName('tr');
            for (let i = 0; i < tableRows.length; i++) {
                const tableCells = tableRows[i].getElementsByTagName('td');
                let visible = true;
                for (let j = 0; j < tableCells.length && visible; j++) {
                    const cellValue = tableCells[j].textContent || tableCells[j].innerText;
                    const filterValue = filters[j];
                    if (filterValue && cellValue.toUpperCase().indexOf(filterValue) === -1) {
                        visible = false;
                    }
                }
                tableRows[i].style.display = visible ? '' : 'none';
            }
        }
    </script>
</body>
</html>

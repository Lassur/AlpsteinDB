<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mountains Table</title>
<style>
  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 8px;
    text-align: left;
    border-bottom: 1px solid #ddd;
  }

  th {
    cursor: pointer;
  }

  .filters {
    margin-bottom: 10px;
  }

  .pagination {
    display: flex;
    justify-content: center;
    margin-top: 10px;
  }

  .pagination button {
    margin: 0 5px;
    padding: 5px 10px;
    cursor: pointer;
    border: none;
    background-color: #f0f0f0;
    border-radius: 5px;
  }

  .pagination button.active {
    background-color: #ddd;
  }
</style>
</head>
<body>

<h1>Mountains Table</h1>

<div class="filters">
  <input type="text" id="searchInput" placeholder="Search...">
</div>

<table id="mountainsTable">
  <thead>
    <tr>
      <th onclick="sortTable(0)">Gipfel</th>
      <th onclick="sortTable(1)">Datum</th>
      <th onclick="sortTable(2)">Wer</th>
      <th onclick="sortTable(3)">Route</th>
      <th onclick="sortTable(4)">Notiz</th>
      <th onclick="sortTable(5)">Gipfelbuch</th>
      <th onclick="sortTable(6)">Erfasste Jahre</th>
    </tr>
  </thead>
  <tbody>
    <!-- Data will be populated dynamically -->
  </tbody>
</table>

<div class="pagination" id="pagination"></div>

<script>
  function sortTable(n) {
    var table, rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
    table = document.getElementById("mountainsTable");
    switching = true;
    dir = "asc"; 
    while (switching) {
      switching = false;
      rows = table.rows;
      for (i = 1; i < (rows.length - 1); i++) {
        shouldSwitch = false;
        x = rows[i].getElementsByTagName("td")[n];
        y = rows[i + 1].getElementsByTagName("td")[n];
        if (dir == "asc") {
          if (x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
            shouldSwitch = true;
            break;
          }
        } else if (dir == "desc") {
          if (x.innerHTML.toLowerCase() < y.innerHTML.toLowerCase()) {
            shouldSwitch = true;
            break;
          }
        }
      }
      if (shouldSwitch) {
        rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
        switching = true;
        switchcount ++; 
      } else {
        if (switchcount == 0 && dir == "asc") {
          dir = "desc";
          switching = true;
        }
      }
    }
  }

  function filterTable() {
    var input, filter, table, tr, td, i, txtValue;
    input = document.getElementById("searchInput");
    filter = input.value.toUpperCase();
    table = document.getElementById("mountainsTable");
    tr = table.getElementsByTagName("tr");
    for (i = 0; i < tr.length; i++) {
      td = tr[i].getElementsByTagName("td")[0]; // Change index to filter specific column
      if (td) {
        txtValue = td.textContent || td.innerText;
        if (txtValue.toUpperCase().indexOf(filter) > -1) {
          tr[i].style.display = "";
        } else {
          tr[i].style.display = "none";
        }
      }
    }
  }

  document.getElementById("searchInput").addEventListener("keyup", filterTable);

  function paginateTable() {
    var table, rows, pageButtons, i;
    table = document.getElementById("mountainsTable");
    rows = table.rows;
    pageButtons = document.getElementById("pagination");
    pageButtons.innerHTML = "";
    var pageCount = Math.ceil((rows.length - 1) / 10); // 10 rows per page
    for (i = 0; i < pageCount; i++) {
      var btn = document.createElement("button");
      btn.innerHTML = i + 1;
      btn.addEventListener("click", function() {
        var pageNum = parseInt(this.innerHTML);
        var start = (pageNum - 1) * 10 + 1;
        var end = pageNum * 10 + 1;
        for (var j = 1; j < rows.length; j++) {
          if (j >= start && j < end) {
            rows[j].style.display = "";
          } else {
            rows[j].style.display = "none";
          }
        }
        var currentBtn = pageButtons.getElementsByClassName("active");
        if (currentBtn.length > 0) {
          currentBtn[0].className = currentBtn[0].className.replace("active", "");
        }
        this.className += " active";
      });
      pageButtons.appendChild(btn);
    }
    if (pageCount > 0) {
      pageButtons.getElementsByTagName("button")[0].click();
    }
  }

  // Fetching and parsing CSV file
  function fetchCSV() {
    fetch('2024_Öberini_raw_webpage.csv')
      .then(response => response.text())
      .then(data => {
        var rows = data.split('\n');
        var table = document.getElementById("mountainsTable").getElementsByTagName('tbody')[0];
        for (var i = 0; i < rows.length; i++) {
          var rowData = rows[i].split(',');
          var row = table.insertRow(-1);
          for (var j = 0; j < rowData.length; j++) {
            var cell = row.insertCell(-1);
            cell.textContent = rowData[j];
          }
        }
        paginateTable();
      })
      .catch(error => console.error(error));
  }

  fetchCSV();
</script>

</body>
</html>

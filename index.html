<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpstein Database</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }
    header {
        background-color: #333;
        color: white;
        padding: 10px 0;
        text-align: center;
    }
    footer {
        background-color: #333;
        color: white;
        padding: 10px 0;
        text-align: center;
        position: fixed;
        bottom: 0;
        width: 100%;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
    }
    th, td {
        border: 1px solid black;
        padding: 8px;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    th {
        background-color: #f2f2f2;
        cursor: pointer;
    }
    th:hover {
        background-color: #ddd;
    }
    .header-fixed {
        position: sticky;
        top: 0;
        z-index: 1;
    }
</style>
</head>
<body>

<header>
    <h1>Alpstein Database</h1>
</header>

<table id="mountainTable">
  <thead class="header-fixed">
    <tr>
      <th onclick="sortTable(0)">Gipfel</th>
      <th onclick="sortTable(1)">Datum</th>
      <th onclick="sortTable(2)">Wer</th>
      <th onclick="sortTable(3)">Route</th>
      <th onclick="sortTable(4)">Wer (un-merged)</th>
      <th onclick="sortTable(5)">Route (un-merged)</th>
      <th onclick="sortTable(6)">Notiz</th>
      <th onclick="sortTable(7)">Gipfelbuch</th>
      <th onclick="sortTable(8)">Erfasste Jahre</th>
      <th onclick="sortTable(9)">Doppelt eingetragen</th>
      <th onclick="sortTable(10)">Kommentar A. Koller</th>
    </tr>
  </thead>
  <tbody id="mountainTableBody">
  </tbody>
</table>

<footer>
    <p>&copy; Andi Koller, 2024</p>
</footer>

<script>
    window.onload = function() {
        fetch('2024_Öberini_raw_webpage.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // skip header row
                const tbody = document.getElementById('mountainTableBody');
                rows.forEach(row => {
                    const columns = row.split(',');
                    const tr = document.createElement('tr');
                    columns.forEach(column => {
                        const td = document.createElement('td');
                        td.textContent = column;
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            });
    }

    function sortTable(columnIndex) {
        const table = document.getElementById('mountainTable');
        const rows = Array.from(table.getElementsByTagName('tr')).slice(1); // Exclude header row
        const isAscending = table.rows[0].cells[columnIndex].classList.contains('asc');
        rows.sort((a, b) => {
            const aValue = a.cells[columnIndex].textContent.trim();
            const bValue = b.cells[columnIndex].textContent.trim();
            return (aValue > bValue) ? 1 : ((bValue > aValue) ? -1 : 0);
        });
        if (isAscending) {
            rows.reverse();
            table.rows[0].cells[columnIndex].classList.remove('asc');
            table.rows[0].cells[columnIndex].classList.add('desc');
        } else {
            table.rows[0].cells[columnIndex].classList.remove('desc');
            table.rows[0].cells[columnIndex].classList.add('asc');
        }
        rows.forEach(row => table.appendChild(row));
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpstein Database</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        font-size: 14px; /* Reduced font size */
    }
    header {
        background-color: #333;
        color: white;
        padding: 5px 0; /* Reduced header padding */
        text-align: center;
    }
    footer {
        background-color: #333;
        color: white;
        padding: 5px 0; /* Reduced footer padding */
        text-align: center;
        position: fixed;
        bottom: 0;
        width: 100%;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid black;
        padding: 5px; /* Reduced cell padding */
        text-align: left;
        overflow-wrap: break-word;
    }
    th {
        background-color: #f2f2f2;
        cursor: pointer;
    }
    th:hover {
        background-color: #ddd;
    }
    .header-fixed {
        position: sticky;
        top: 0;
        z-index: 1;
    }
    .filter-select {
        width: 100%;
        box-sizing: border-box;
    }
</style>
</head>
<body>

<header>
    <h1>Alpstein Database</h1>
</header>

<table id="mountainTable">
  <thead class="header-fixed">
    <tr>
      <th>Gipfel</th>
      <th>Datum</th>
      <th>Wer</th>
      <th>Route</th>
      <th>Wer (un-merged)</th>
      <th>Route (un-merged)</th>
      <th>Notiz</th>
      <th>Gipfelbuch</th>
      <th>Erfasste Jahre</th>
      <th>Doppelt eingetragen</th>
      <th>Kommentar A. Koller</th>
    </tr>
  </thead>
  <tbody id="mountainTableBody">
  </tbody>
</table>

<footer>
    <p>&copy; Andi Koller, 2024</p>
</footer>

<script>
    window.onload = function() {
        fetch('2024_Öberini_raw_webpage.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // skip header row
                const tbody = document.getElementById('mountainTableBody');
                rows.forEach(row => {
                    const columns = row.split(',');
                    const tr = document.createElement('tr');
                    columns.forEach(column => {
                        const td = document.createElement('td');
                        td.textContent = column;
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            });
    }

    function sortTable(columnIndex) {
        const table = document.getElementById('mountainTable');
        const rows = Array.from(table.getElementsByTagName('tr')).slice(1); // Exclude header row
        const isAscending = table.rows[0].cells[columnIndex].classList.contains('asc');
        rows.sort((a, b) => {
            const aValue = a.cells[columnIndex].textContent.trim();
            const bValue = b.cells[columnIndex].textContent.trim();
            return (aValue > bValue) ? 1 : ((bValue > aValue) ? -1 : 0);
        });
        if (isAscending) {
            rows.reverse();
            table.rows[0].cells[columnIndex].classList.remove('asc');
            table.rows[0].cells[columnIndex].classList.add('desc');
        } else {
            table.rows[0].cells[columnIndex].classList.remove('desc');
            table.rows[0].cells[columnIndex].classList.add('asc');
        }
        rows.forEach(row => table.appendChild(row));
    }

    function filterTable(columnIndex) {
        const select = document.getElementById(`filterSelect${columnIndex}`);
        const filterValue = select.value.toUpperCase();
        const table = document.getElementById('mountainTable');
        const rows = table.getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            const cell = rows[i].getElementsByTagName('td')[columnIndex];
            if (cell) {
                const cellText = cell.textContent.toUpperCase() || cell.innerText.toUpperCase();
                if (filterValue === 'ALL' || cellText.includes(filterValue)) {
                    rows[i].style.display = '';
                } else {
                    rows[i].style.display = 'none';
                }
            }
        }
    }
</script>

</body>
</html>

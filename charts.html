<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Gipfelbuch – Charts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html">Willkommen</a>
      <a href="eintraege.html">Einträge</a>
      <a href="charts.html" class="active">Charts</a>
    </nav>

    <h1>Interaktive Diagramme</h1>

    <div style="margin-bottom: 1rem;">
      <label for="gipfelFilter">Gipfel:</label>
      <select id="gipfelFilter"></select>

      <label for="routeFilter" style="margin-left:1rem;">Route:</label>
      <select id="routeFilter"></select>

      <label for="buchFilter" style="margin-left:1rem;">Buch:</label>
      <select id="buchFilter"></select>

      <label for="buchtypFilter" style="margin-left:1rem;">Buchtyp:</label>
      <select id="buchtypFilter"></select>

      <label for="jahrFilter" style="margin-left:1rem;">Jahr:</label>
<select id="jahrFilter"></select>
<label for="monatFilter" style="margin-left:1rem;">Monat:</label>
<select id="monatFilter">
<option value="">Alle</option>
<option value="1">01</option>
<option value="2">02</option>
<option value="3">03</option>
<option value="4">04</option>
<option value="5">05</option>
<option value="6">06</option>
<option value="7">07</option>
<option value="8">08</option>
<option value="9">09</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>
<label for="erfasstFilter" style="margin-left:1rem;">Erfasste Jahre:</label>Erfasste Jahre:</label>
      <select id="erfasstFilter"></select>
    </div>

    <h2>Einträge nach Jahren</h2>
    <canvas id="yearChart" height="100"></canvas>
<p><button onclick="saveChartAsPNG(chartYear, 'jahr_chart.png')">📥 Als PNG speichern</button></p>

    <h2 style="margin-top: 4rem;">Einträge nach Saisonalität</h2>
    <canvas id="monthChart" height="100"></canvas>
<p><button onclick="saveChartAsPNG(chartMonth, 'saison_chart.png')">📥 Als PNG speichern</button></p>

    
    <h2 style="margin-top: 4rem;">Einträge nach Routen</h2>

<h2 style="margin-top: 4rem;">Top10 Tage nach Anzahl Einträge</h2>
<canvas id="topdayChart" height="100"></canvas>
<p><button onclick="saveChartAsPNG(chartTopDays, 'top10tage_chart.png')">📥 Als PNG speichern</button></p>
    
    <footer style="text-align:center; font-size: 0.8rem; margin-top: 4rem; color: #666;">
      © Andreas Koller, 2025 – <a href="mailto:andreas-koller@gmx.ch">andreas-koller@gmx.ch</a>
    </footer>
  </div>
  <script src="chart-script.js"></script>
</body>
</html>

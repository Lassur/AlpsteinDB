<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unfälle - Alpstein DB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.21/css/jquery.dataTables.min.css">
</head>
<body>
    <header>
        <h1>Alpstein DB</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gipfelbuecher.html">Gipfelbücher</a></li>
                <li><a href="unfaelle.html">Unfälle</a></li>
                <li><a href="statistics.html">Statistiken</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Unfälle</h2>
        <table id="unfaelle-table" class="display">
            <thead>
                <tr>
                    <th>Jahr</th>
                    <th>Datum</th>
                    <th>Ort (Detail)</th>
                    <th>Zuordnung Gipfel/Alp</th>
                    <th>Ereignis</th>
                    <th>Aktivität</th>
                    <th>Unfallursache</th>
                    <th>#Tote</th>
                    <th>Herkunft Verunfallte</th>
                    <th>Quellen</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data from the CSV file will be populated here -->
            </tbody>
        </table>
    </main>

    <footer>
        © 2024, Andreas Koller, Appenzell
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        $(document).ready(function() {
            $.get('2024-06-28_Unfälle Alpstein.csv', function(data) {
                Papa.parse(data, {
                    header: true,
                    complete: function(results) {
                        var dataSet = results.data;
                        $('#unfaelle-table').DataTable({
                            data: dataSet,
                            columns: [
                                { data: 'Jahr' },
                                { data: 'Datum' },
                                { data: 'Ort (Detail)' },
                                { data: 'Zuordnung Gipfel/Alp' },
                                { data: 'Ereignis' },
                                { data: 'Aktivität' },
                                { data: 'Unfallursache' },
                                { data: '#Tote' },
                                { data: 'Herkunft Verunfallte' },
                                { data: 'Quellen' }
                            ],
                            language: {
                                "sProcessing": "Verarbeite...",
                                "sLengthMenu": "Zeige _MENU_ Einträge",
                                "sZeroRecords": "Keine Einträge gefunden",
                                "sInfo": "Zeige _START_ bis _END_ von _TOTAL_ Einträgen",
                                "sInfoEmpty": "Zeige 0 bis 0 von 0 Einträgen",
                                "sInfoFiltered": "(gefiltert von _MAX_ Einträgen insgesamt)",
                                "sSearch": "Suchen:",
                                "oPaginate": {
                                    "sFirst": "Erste",
                                    "sPrevious": "Zurück",
                                    "sNext": "Weiter",
                                    "sLast": "Letzte"
                                }
                            }
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
